<!---------- HEADER ------------------->

<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* css titulos */

        body {
            height: 10%;
        }

        header {
            width: 95%;
            margin-left: 20px;

        }

        #areatitulos {
            width: 100%;
            height: auto;
            background-color: #000000;
            border: none;
            border-radius: 10px;
            box-shadow: 2px 2px 10px #000000;
            justify-items: center;
            justify-content: center;
            display: flex;
            padding: 5px;
        }

        #textotitulos {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: auto;
            font-size: 40px;
            color: white;
            display: flex;
            margin: 0;
        }

        #imgregresar {
            position: absolute;
            width: 35px;
            height: 35px;
            left: 50px;
            margin: 13px;
        }

        @media (max-width:450px) {
            #textotitulos {
                font-size: 20px;
            }

            #imgregresar {
                position: absolute;
                width: 35px;
                height: 35px;
                left: 50px;
                margin: 13px;
                display: none;
            }

            header {
                width: 90%;
                justify-items: center;
                justify-content: center;
                align-items: center;
                display: inline-block;
                margin-bottom: 0%;
                margin-left: 20px;
            }
        }
    </style>


</head>

<body>
    <!----------TITULO ------------------->
    <header>
        <div id="areatitulos">
            <h1 id="textotitulos">

            </h1>
            <a href="https://sites.google.com/view/clickbienesraices/ofertas-urbanas">
                <img id="imgregresar" src="https://drive.google.com/thumbnail?id=1LE3Fx9ppqN0t6RAvSwVTE9x9GMLV0-1v">
            </a>
        </div>
    </header>
    <script>
        const CATEGORIA = "PRUEBA";
        document.getElementById("textotitulos").innerText = CATEGORIA;
    </script>
</body>

</html>
