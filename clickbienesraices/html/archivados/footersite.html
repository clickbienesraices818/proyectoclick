<!-- Footer del sitio web -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        footer {
            width: 100%;
            height: 60px;
            box-shadow: 2px 2px 10px #000000;
            background-color: #000000;
            gap: 30px;
            display: flex;
            justify-content: center;
            border-radius: 10px;
            padding-top: 10px;
        }

        .cuadrocontacto {
            width: 60%;
            height: auto;
            background-color: #000000;
            font-size: 14px;
            gap: 30px;
            display: inline-flex;
            justify-content: center;
            justify-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-bottom: 10px;
            margin-left: 10px;
        }

        .cuadroredes {
            width: 30%;
            height: auto;
            background-color: #000000;
            font-size: 14px;
            align-items: center;
            gap: 30px;
            display: inline-flex;
            justify-content: center;
            margin-bottom: 10px;
            margin-right: 40px;
        }

        .imgcontacto {
            width: 30px;
            height: 30px;
            transition: transform 0.5s ease;
        }

        .imgcontacto:hover {
            transform: scale(120%);
            background-color: #0EC10E;
            border-radius: 10px;
        }


        #enviarcorreo {
            text-decoration: none;
            color: white;
        }

        .informacionfooter {
            align-items: center;
            display: flex;
            gap: 7px;
            padding-bottom: 10px;
            color: white;
            justify-content: center;
            transition: transform 0.5s ease;
        }

        .informacionfooter:hover {
            transform: scale(110%);
            background-color: #0EC10E;
            border-radius: 10px;

        }

        /*  OTROS  */
        @media (max-width:800px) {
            footer {
                justify-items: center;
                height: auto;
                display: block;
            }

            .cuadrocontacto {
                display: block;
                justify-content: center;
                height: auto;
                padding: 0%;
                width: 80%;
            }

            .cuadroredes {
                display: flex;
                height: auto;
                margin: 0%;
                padding: 0%;
                width: 80%;
            }
        }
    </style>
</head>
